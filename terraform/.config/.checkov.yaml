framework:
  - terraform
quiet: false
compact: false
skip-check:
  # CKV_AWS_158: CloudWatch log group not encrypted with KMS CMK. AWS-managed encryption is acceptable
  # for application logs; consumers can override the log group on a case-by-case basis.
  - CKV_AWS_158
  # CKV_AWS_115: Lambda concurrent execution limits. Configurable per function via reserved_concurrency.
  - CKV_AWS_115
  # CKV_AWS_116: Lambda function-level DLQ. SQS-triggered Lambdas use the SQS DLQ via redrive policy,
  # which is the canonical pattern for poll-based event sources.
  - CKV_AWS_116
  # CKV_AWS_117: Lambda inside VPC. Optional in this module by design.
  - CKV_AWS_117
  # CKV_AWS_173: Encrypt Lambda env vars with CMK. Default aws/lambda key is acceptable.
  - CKV_AWS_173
